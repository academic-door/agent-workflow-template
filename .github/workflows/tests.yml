name: Template checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PR 事件默认检出 GitHub 生成的临时 merge ref，可能带入维护者的
          # 提交邮箱。检查真实 head commit，避免隐私门禁误报。
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Check commit emails
        run: python scripts/check_commit_emails.py

      - name: Check repository hygiene
        run: python scripts/check_repository_hygiene.py
